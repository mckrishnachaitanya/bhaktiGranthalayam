<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>భక్తి గ్రంథాలయం</title>
<meta name="description" content="Bhakti Granthalayam — Telugu devotional library">
<meta name="theme-color" content="#FAF6ED">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Telugu:wght@400;500;700&family=Suranna&family=Noto+Sans+Telugu:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FAF6ED; --ink:#33291F; --ink-soft:#6E6152;
  --kumkuma:#A93226; --pasupu:#C99414; --line:#E4DBC8;
  --card:#FFFDF7; --bead:#D8CDB6; --bead-done:#A93226;
  --serif:'Noto Serif Telugu',serif; --disp:'Suranna',serif; --sans:'Noto Sans Telugu',system-ui,sans-serif;
}
[data-theme="sepia"]{
  --paper:#F2E7D0; --ink:#4A3B28; --ink-soft:#7D6B50; --line:#DCCCA9;
  --card:#F8F0DD; --bead:#CBBB98;
}
[data-theme="dark"]{
  --paper:#191512; --ink:#E9E0D0; --ink-soft:#9C8F7C;
  --kumkuma:#E07B5F; --pasupu:#D9AD3C; --line:#332C24;
  --card:#211C17; --bead:#3D3529; --bead-done:#E07B5F;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);
  transition:background .25s,color .25s;min-height:100dvh}
button{font-family:var(--sans);background:none;border:none;color:inherit;cursor:pointer}
:focus-visible{outline:2px solid var(--kumkuma);outline-offset:2px}
.hide{display:none!important}

/* ---------- top bar ---------- */
header{position:sticky;top:0;z-index:5;background:var(--paper);
  border-bottom:1px solid var(--line);
  padding:calc(env(safe-area-inset-top) + 10px) 16px 10px;
  display:flex;align-items:center;gap:10px}
header h1{font-family:var(--disp);font-size:1.5rem;font-weight:400;
  color:var(--kumkuma);flex:1;line-height:1.2}
header .sub{font-size:.68rem;color:var(--ink-soft);letter-spacing:.08em;text-transform:uppercase}
.iconbtn{font-size:1.15rem;padding:8px;border-radius:8px;line-height:1;color:var(--ink-soft)}
.iconbtn:active{background:var(--line)}

/* ---------- shelf ---------- */
main{padding:16px 16px calc(env(safe-area-inset-bottom) + 24px);max-width:640px;margin:0 auto}
.shelf-intro{font-size:.85rem;color:var(--ink-soft);margin-bottom:16px;line-height:1.6}
.booklist{display:flex;flex-direction:column;gap:12px}
.bookcard{display:flex;align-items:center;gap:14px;background:var(--card);
  border:1px solid var(--line);border-radius:14px;padding:16px;text-align:left;width:100%}
.bookcard .glyph{font-family:var(--disp);font-size:1.6rem;color:var(--kumkuma);
  width:44px;height:44px;border-radius:10px;background:var(--paper);
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.bookcard .info{flex:1}
.bookcard .ttl{font-family:var(--serif);font-size:1.05rem;font-weight:500}
.bookcard .sub2{font-size:.75rem;color:var(--ink-soft);margin-top:2px}
.bookcard .prog{font-size:.7rem;color:var(--kumkuma);margin-top:4px}

/* ---------- home (per-book chapter list) ---------- */
.continue{display:block;width:100%;text-align:left;background:var(--kumkuma);color:#FBF3E7;
  border-radius:14px;padding:14px 16px;margin-bottom:18px}
.continue .lbl{font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;opacity:.85}
.continue .ttl{font-family:var(--serif);font-size:1.05rem;font-weight:500;margin-top:3px}

/* mala */
.mala{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;
  padding:14px 10px;border:1px solid var(--line);border-radius:14px;
  background:var(--card);margin-bottom:6px}
.bead{width:11px;height:11px;border-radius:50%;background:var(--bead);transition:background .3s}
.bead.done{background:var(--bead-done)}
.mala-cap{text-align:center;font-size:.75rem;color:var(--ink-soft);margin-bottom:18px}
.mala-cap b{color:var(--kumkuma)}

.dayhdr{display:flex;align-items:baseline;gap:8px;margin:22px 2px 8px}
.dayhdr .d{font-family:var(--disp);font-size:1.25rem;color:var(--kumkuma)}
.dayhdr .rule{flex:1;height:1px;background:var(--line)}
.chlist{display:flex;flex-direction:column;gap:8px}
.ch{display:flex;align-items:center;gap:12px;background:var(--card);
  border:1px solid var(--line);border-radius:12px;padding:12px 14px;text-align:left;width:100%}
.ch .num{font-family:var(--disp);font-size:1.15rem;color:var(--pasupu);min-width:1.8em;text-align:center}
.ch .t{flex:1;font-family:var(--serif);font-size:.95rem;line-height:1.45}
.ch .tick{font-size:1rem;color:var(--bead)}
.ch.read .tick{color:var(--kumkuma)}
.ch.read .t{color:var(--ink-soft)}

/* ---------- reader ---------- */
#reader article{font-family:var(--serif);line-height:1.9;padding-top:6px}
#reader h2{font-family:var(--disp);font-weight:400;color:var(--kumkuma);
  font-size:1.45em;line-height:1.4;text-align:center;margin:14px 0 20px}
#reader p{margin:0 0 1.1em;text-align:justify;white-space:pre-line}
.endmark{text-align:center;font-family:var(--disp);color:var(--pasupu);
  font-size:1.3rem;margin:26px 0 10px;letter-spacing:.3em}
.endactions{display:flex;flex-direction:column;gap:10px;margin:10px 0 30px}
.btn{border:1px solid var(--line);background:var(--card);border-radius:12px;
  padding:13px;font-size:.95rem;text-align:center}
.btn.primary{background:var(--kumkuma);border-color:var(--kumkuma);color:#FBF3E7}
.navrow{display:flex;gap:10px}
.navrow .btn{flex:1}

/* ---------- settings sheet ---------- */
#sheet{position:fixed;inset:0;z-index:20;background:rgba(0,0,0,.35);display:flex;align-items:flex-end}
.panel{background:var(--card);width:100%;border-radius:18px 18px 0 0;
  padding:18px 18px calc(env(safe-area-inset-bottom) + 22px);max-width:640px;margin:0 auto}
.panel h3{font-size:.8rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);margin:14px 0 8px}
.seg{display:flex;gap:8px}
.seg button{flex:1;border:1px solid var(--line);border-radius:10px;padding:11px;font-size:.9rem}
.seg button.on{border-color:var(--kumkuma);color:var(--kumkuma);font-weight:600}
.danger{color:var(--kumkuma);font-size:.85rem;padding:12px 0 0;text-align:center;width:100%}
.hist{font-size:.8rem;color:var(--ink-soft);margin-top:6px;line-height:1.7}

/* ---------- share ---------- */
.bookcard{cursor:pointer}
.bookcard .shareIcon{flex-shrink:0;font-size:1.05rem;padding:8px;border-radius:8px;color:var(--ink-soft)}
.bookcard .shareIcon:active{background:var(--paper)}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);
  background:var(--ink);color:var(--paper);padding:10px 18px;border-radius:20px;
  font-size:.85rem;z-index:30;opacity:0;transition:opacity .25s;pointer-events:none;
  max-width:80vw;text-align:center}
.toast.show{opacity:1}

/* reduced motion */
@media (prefers-reduced-motion: reduce){*{transition:none!important}}
</style>
</head>
<body data-theme="light">

<header id="topbar">
  <button class="iconbtn hide" id="backBtn" aria-label="వెనుకకు / Back">←</button>
  <div style="flex:1">
    <h1 id="barTitle">భక్తి గ్రంథాలయం</h1>
    <div class="sub" id="barSub">Bhakti Granthalayam</div>
  </div>
  <button class="iconbtn hide" id="shareBtn" aria-label="Share">⤴</button>
  <button class="iconbtn" id="settingsBtn" aria-label="Settings">Aa</button>
</header>

<main id="shelf"></main>
<main id="home" class="hide"></main>
<main id="reader" class="hide"></main>
<div id="toast" class="toast"></div>

<div id="sheet" class="hide">
  <div class="panel">
    <h3>అక్షర పరిమాణం · Font size</h3>
    <div class="seg" id="fontSeg">
      <button data-f="0.9">చిన్నది</button><button data-f="1.05">మధ్యమం</button>
      <button data-f="1.25">పెద్దది</button><button data-f="1.45">అతి పెద్దది</button>
    </div>
    <h3>నేపథ్యం · Theme</h3>
    <div class="seg" id="themeSeg">
      <button data-t="light">Light</button><button data-t="sepia">Sepia</button><button data-t="dark">Dark</button>
    </div>
    <h3 id="parayanaHdr" class="hide">పారాయణ · Parayana</h3>
    <button class="btn hide" id="resetBtn">కొత్త సప్తాహం ప్రారంభించండి · Start new saptaha</button>
    <div class="hist" id="histBox"></div>
    <h3>యాప్ · App</h3>
    <button class="btn" id="refreshBtn">🔄 తాజాగా రిఫ్రెష్ చేయండి · Force refresh</button>
    <button class="danger" id="closeSheet">మూసివేయి · Close</button>
  </div>
</div>

<script>
"use strict";
/* ------------ storage helper (book-namespaced) ------------ */
const LS = {
  get(k,d){ try{const v=localStorage.getItem("ssc_"+k);return v===null?d:JSON.parse(v)}catch(e){return d} },
  set(k,v){ try{localStorage.setItem("ssc_"+k,JSON.stringify(v))}catch(e){} }
};

let booksConfig = [];          // from books.json
let bookDataCache = {};        // { bookId: prepped chapters array }
let currentBookId = null;
let currentBookCfg = null;
let chapters = [];             // current book's prepped chapters

/* per-book state, loaded whenever we enter a book */
let read      = {};
let lastCh    = null;
let scrollPos = {};
let history_  = [];
let currentChIndex = null;  // index of chapter currently open in reader (any book type)

/* display prefs are app-wide, not per-book */
let fontScale = LS.get("font", 1.05);
let theme     = LS.get("theme", "light");

/* Every Satcharitra chapter page repeats this banner as its first line; the
   real heading (e.g. "మొదటి అధ్యాయము") is the line right after it. */
const BANNER = "శ్రీ సాయి సత్ చరిత్రము";

const $ = s => document.querySelector(s);
const shelf = $("#shelf"), home = $("#home"), reader = $("#reader");

/* ------------ per-book state load/save ------------ */
function loadBookState(id){
  read      = LS.get(`read_${id}`, {});
  lastCh    = LS.get(`lastCh_${id}`, null);
  scrollPos = LS.get(`scroll_${id}`, {});
  history_  = LS.get(`history_${id}`, []);
}
function saveRead(){ LS.set(`read_${currentBookId}`, read); }
function saveLastCh(){ LS.set(`lastCh_${currentBookId}`, lastCh); }
function saveScroll(){ LS.set(`scroll_${currentBookId}`, scrollPos); }
function saveHistory(){ LS.set(`history_${currentBookId}`, history_); }

/* ------------ preprocessing (Satcharitra-style chapters) ------------ */
function prepChapters(raw){
  return raw.map(c=>{
    const paras = c.paragraphs || [];
    const hasBanner = paras[0] && paras[0].trim()===BANNER;
    const titleIdx = hasBanner ? 1 : 0;
    const title = (paras[titleIdx] || c.title || "").trim();
    const body = paras.slice(titleIdx+1);
    const nums = (c.link_text||"").match(/\d+/g);
    const isChapter = /^Chapters?\b/i.test(c.link_text||"") && nums;
    return {
      ...c,
      title,
      body,
      isChapter: !!isChapter,
      chapNums: isChapter ? nums.map(Number) : []
    };
  });
}

/* ------------ preprocessing (sloka/stotra collections) ------------ */
/* Flat items, no chapter numbers, no story order — expects [{title, text}, ...]
   or [{title, paragraphs:[...]}, ...] in the source JSON. */
function prepCollection(raw){
  return raw.map(c=>({
    title: (c.title || "").trim(),
    body: c.text ? c.text.split(/\n+/).map(s=>s.trim()).filter(Boolean)
                  : (c.paragraphs || [])
  }));
}

function prepBookData(raw, cfg){
  return (cfg && cfg.type === "collection") ? prepCollection(raw) : prepChapters(raw);
}

/* ------------ boot ------------ */
applyTheme(theme);
fetch("books.json")
  .then(r=>r.json())
  .then(d=>{ booksConfig=d; route(); })
  .catch(()=>{ shelf.innerHTML="<p style='padding:30px;text-align:center'>books.json లోడ్ కాలేదు. ఇంటర్నెట్‌తో ఒకసారి తెరవండి.<br>Could not load library. Open once with internet.</p>"; });

window.addEventListener("hashchange", route);

async function loadBookChapters(id){
  if(bookDataCache[id]) return bookDataCache[id];
  const cfg = booksConfig.find(b=>b.id===id);
  if(!cfg) return null;
  const raw = await fetch(cfg.chaptersFile).then(r=>r.json());
  const prepped = prepBookData(raw, cfg);
  bookDataCache[id] = prepped;
  return prepped;
}

async function enterBook(id){
  currentBookCfg = booksConfig.find(b=>b.id===id) || null;
  if(currentBookId !== id){
    currentBookId = id;
    loadBookState(id);
  }
  chapters = await loadBookChapters(id) || [];
}

function route(){
  const mCh = location.hash.match(/^#\/book\/([\w-]+)\/ch\/(\d+)$/);
  const mBk = location.hash.match(/^#\/book\/([\w-]+)$/);
  if(mCh){
    enterBook(mCh[1]).then(()=>{
      if(chapters[+mCh[2]]) showReader(+mCh[2]); else showHome();
    });
  } else if(mBk){
    enterBook(mBk[1]).then(showHome);
  } else {
    showShelf();
  }
}

/* ------------ shelf (library home) ------------ */
function showShelf(){
  home.classList.add("hide"); reader.classList.add("hide"); shelf.classList.remove("hide");
  $("#backBtn").classList.add("hide");
  $("#shareBtn").classList.add("hide");
  $("#barTitle").textContent="భక్తి గ్రంథాలయం";
  $("#barSub").textContent="Bhakti Granthalayam";
  document.title="భక్తి గ్రంథాలయం";

  let h = `<div class="shelf-intro">మీ గ్రంథాలయం · Your library</div><div class="booklist">`;
  h += booksConfig.map(b=>{
    const isCollection = b.type === "collection";
    const done = isCollection ? 0 : Object.keys(LS.get(`read_${b.id}`, {})).length;
    return `<div class="bookcard" onclick="location.hash='#/book/${b.id}'">
      <span class="glyph">${isCollection ? "🪔" : "📖"}</span>
      <span class="info">
        <span class="ttl">${esc(b.title)}</span>
        <span class="sub2">${esc(b.subtitle||"")}</span>
        ${done ? `<span class="prog">${done} చదివారు · read</span>` : ""}
      </span>
      <button class="shareIcon" aria-label="Share book" onclick="event.stopPropagation();shareBook('${b.id}')">⤴</button>
    </div>`;
  }).join("");
  h += `</div>`;
  shelf.innerHTML = h;
}

/* ------------ home (per-book chapter list) ------------ */
function showHome(){
  shelf.classList.add("hide"); reader.classList.add("hide"); home.classList.remove("hide");
  $("#backBtn").classList.remove("hide");
  $("#barTitle").textContent = currentBookCfg ? currentBookCfg.title : "";
  $("#barSub").textContent = currentBookCfg ? (currentBookCfg.subtitle||"") : "";
  document.title = currentBookCfg ? currentBookCfg.title : "భక్తి గ్రంథాలయం";

  const shareBtn = $("#shareBtn");
  shareBtn.classList.remove("hide");
  shareBtn.onclick = ()=>shareBook(currentBookId);

  if(currentBookCfg && currentBookCfg.type === "collection"){
    showCollectionHome();
    return;
  }

  let h="";
  if(lastCh!==null && chapters[lastCh]){
    h+=`<button class="continue" onclick="location.hash='#/book/${currentBookId}/ch/${lastCh}'">
      <div class="lbl">చదవడం కొనసాగించండి · Continue reading</div>
      <div class="ttl">${esc(shortTitle(lastCh))}</div></button>`;
  }
  const total = chapters.length, done = Object.keys(read).length;
  h+=`<div class="mala" aria-label="progress">`;
  for(let i=0;i<total;i++) h+=`<span class="bead${read[i]?" done":""}"></span>`;
  h+=`</div><div class="mala-cap"><b>${done}</b> / ${total} అధ్యాయాలు పఠించారు</div>`;

  const daySplit = currentBookCfg && currentBookCfg.daySplit;
  const covered=new Set();
  if(daySplit){
    daySplit.forEach((rg,di)=>{
      const idxs=[...chapters.keys()].filter(i=>{
        const c=chapters[i];
        return c.isChapter && c.chapNums.some(n=>n>=rg[0]&&n<=rg[1]);
      });
      if(!idxs.length)return;
      h+=dayHeader(`దినము ${di+1} · Day ${di+1}`);
      h+=`<div class="chlist">`+idxs.map(chRow).join("")+`</div>`;
      idxs.forEach(i=>covered.add(i));
    });
  }
  const extras=[...chapters.keys()].filter(i=>!covered.has(i));
  if(extras.length){
    if(daySplit) h+=dayHeader("పూజ మరియు హారతులు · Prayers & Aartis");
    h+=`<div class="chlist">`+extras.map(chRow).join("")+`</div>`;
  }
  home.innerHTML=h;
}
/* Collections (slokas/stotras): flat tap-to-read list, no order, no progress,
   no continue-card, no day-grouping — none of that applies to this content type. */
function showCollectionHome(){
  const h = `<div class="chlist">` + chapters.map((c,i)=>`
    <button class="ch" onclick="location.hash='#/book/${currentBookId}/ch/${i}'">
      <span class="num">✦</span>
      <span class="t">${esc(c.title||("అంశం "+i))}</span>
    </button>`).join("") + `</div>`;
  home.innerHTML = h;
}
function dayHeader(t){return `<div class="dayhdr"><span class="d">${t}</span><span class="rule"></span></div>`}
function chRow(i){
  const c=chapters[i];
  const num=c.isChapter ? c.chapNums.join("–") : "✦";
  return `<button class="ch${read[i]?" read":""}" onclick="location.hash='#/book/${currentBookId}/ch/${i}'">
    <span class="num">${num}</span>
    <span class="t">${esc(shortTitle(i))}</span>
    <span class="tick">✔</span></button>`;
}
function shortTitle(i){
  const t=chapters[i].title||("అధ్యాయము "+i);
  return t.length>60 ? t.slice(0,58)+"…" : t;
}

/* ------------ reader ------------ */
function showReader(i){
  shelf.classList.add("hide"); home.classList.add("hide"); reader.classList.remove("hide");
  $("#backBtn").classList.remove("hide");
  currentChIndex = i;
  const shareBtn = $("#shareBtn");
  shareBtn.classList.remove("hide");
  shareBtn.onclick = shareChapter;
  const c=chapters[i];
  $("#barTitle").textContent=shortTitle(i);
  $("#barSub").textContent=`Chapter ${i} of ${chapters.length-1}`;
  document.title=shortTitle(i);

  const isCollection = currentBookCfg && currentBookCfg.type === "collection";

  let h=`<article style="font-size:${fontScale}rem">`;
  h+=`<h2>${esc(c.title)}</h2>`;
  c.body.forEach(p=>{ h+=`<p>${esc(p)}</p>`; });
  h+=`</article><div class="endmark">❋ ❋ ❋</div>`;

  if(isCollection){
    /* Standalone item: no progress tracking, no sequence — just back to the list. */
    h+=`<div class="endactions"><div class="navrow">
      <button class="btn" onclick="shareChapter()">↗ పంచుకోండి · Share</button>
      <button class="btn" onclick="location.hash='#/book/${currentBookId}'">జాబితా · List</button>
    </div></div>`;
    reader.innerHTML=h;
    requestAnimationFrame(()=>window.scrollTo(0,0));
    return;
  }

  lastCh=i; saveLastCh();
  h+=`<div class="endactions">
    <button class="btn primary" id="doneBtn">${read[i]?"పఠించారు ✔ · Read":"పఠించాను ✔ · Mark as read"}</button>
    <div class="navrow">
      ${i>0?`<button class="btn" onclick="location.hash='#/book/${currentBookId}/ch/${i-1}'">‹ మునుపటి</button>`:""}
      <button class="btn" onclick="location.hash='#/book/${currentBookId}'">జాబితా · List</button>
      ${i<chapters.length-1?`<button class="btn" onclick="location.hash='#/book/${currentBookId}/ch/${i+1}'">తరువాత ›</button>`:""}
    </div>
    <button class="btn" onclick="shareChapter()">↗ ఈ అధ్యాయాన్ని పంచుకోండి · Share this chapter</button>
  </div>`;
  reader.innerHTML=h;
  $("#doneBtn").onclick=()=>{ read[i]=true; saveRead(); location.hash=`#/book/${currentBookId}`; };

  requestAnimationFrame(()=>window.scrollTo(0, scrollPos[i]||0));
}
let scrollTimer=null;
window.addEventListener("scroll",()=>{
  if(reader.classList.contains("hide")||lastCh===null)return;
  clearTimeout(scrollTimer);
  scrollTimer=setTimeout(()=>{ scrollPos[lastCh]=window.scrollY; saveScroll(); },300);
},{passive:true});

/* back button: reader -> book home; book home -> shelf; shelf -> (hidden) */
$("#backBtn").onclick=()=>{
  const mCh = location.hash.match(/^#\/book\/([\w-]+)\/ch\/(\d+)$/);
  if(mCh){ location.hash = `#/book/${mCh[1]}`; }
  else { location.hash = ""; }
};

/* ------------ settings ------------ */
$("#settingsBtn").onclick=()=>{ syncSheet(); $("#sheet").classList.remove("hide"); };
$("#closeSheet").onclick=()=>$("#sheet").classList.add("hide");
$("#sheet").onclick=e=>{ if(e.target.id==="sheet") $("#sheet").classList.add("hide"); };

$("#fontSeg").onclick=e=>{
  const b=e.target.closest("button"); if(!b)return;
  fontScale=+b.dataset.f; LS.set("font",fontScale); syncSheet();
  const a=reader.querySelector("article"); if(a)a.style.fontSize=fontScale+"rem";
};
$("#themeSeg").onclick=e=>{
  const b=e.target.closest("button"); if(!b)return;
  theme=b.dataset.t; LS.set("theme",theme); applyTheme(theme); syncSheet();
};
function applyTheme(t){
  document.body.dataset.theme=t;
  const meta=document.querySelector('meta[name=theme-color]');
  meta.content = t==="dark"?"#191512": t==="sepia"?"#F2E7D0":"#FAF6ED";
}
function syncSheet(){
  document.querySelectorAll("#fontSeg button").forEach(b=>b.classList.toggle("on",+b.dataset.f===fontScale));
  document.querySelectorAll("#themeSeg button").forEach(b=>b.classList.toggle("on",b.dataset.t===theme));

  /* Parayana reset only makes sense inside a book with a day-split (Satcharitra-style) */
  const inBook = currentBookId && currentBookCfg && currentBookCfg.daySplit;
  $("#parayanaHdr").classList.toggle("hide", !inBook);
  $("#resetBtn").classList.toggle("hide", !inBook);
  $("#histBox").innerHTML = inBook
    ? (history_.length
        ? "పూర్తయిన పారాయణలు · Completed: "+history_.map(d=>`<b>${d}</b>`).join(", ")
        : "ఇంకా పారాయణ పూర్తికాలేదు · No completed saptaha yet.")
    : "";
}
$("#resetBtn").onclick=()=>{
  const done=Object.keys(read).length;
  if(!confirm("కొత్త సప్తాహం ప్రారంభించాలా? ప్రస్తుత పురోగతి రీసెట్ అవుతుంది.\nStart a new saptaha? Current progress will reset."))return;
  if(done>=chapters.length-1){ history_.push(new Date().toISOString().slice(0,10)); saveHistory(); }
  read={}; saveRead();
  scrollPos={}; saveScroll();
  lastCh=null; saveLastCh();
  $("#sheet").classList.add("hide"); showHome();
};

/* Force refresh: clears SW + caches and hard-reloads. Replaces the old
   manual "bump VERSION in sw.js every deploy" approach — this button
   is the recovery tool for stale installs (e.g. on someone else's phone). */
$("#refreshBtn").onclick=async ()=>{
  if(!confirm("యాప్‌ను తాజాగా రిఫ్రెష్ చేయాలా? మళ్ళీ లోడ్ అవుతుంది.\nForce refresh the app to fetch the latest content?"))return;
  try{
    if("serviceWorker" in navigator){
      const regs = await navigator.serviceWorker.getRegistrations();
      for(const r of regs) await r.unregister();
    }
    if("caches" in window){
      const keys = await caches.keys();
      await Promise.all(keys.map(k=>caches.delete(k)));
    }
  }catch(e){}
  location.reload();
};

/* ------------ sharing ------------ */
let toastTimer=null;
function toast(msg){
  const t=$("#toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),2400);
}
function shareLink(hash){
  return location.origin + location.pathname + hash;
}
async function doShare(title, text, url){
  if(navigator.share){
    try{ await navigator.share({title, text, url}); return; }
    catch(e){ if(e && e.name==="AbortError") return; /* user cancelled the sheet, do nothing */ }
  }
  const full = `${text}\n${url}`;
  try{
    await navigator.clipboard.writeText(full);
    toast("లింక్ కాపీ చేయబడింది · Copied — paste it in WhatsApp");
  }catch(e){
    prompt("కాపీ చేసి పంపండి · Copy this and send:", full);
  }
}
function shareBook(id){
  const b = booksConfig.find(x=>x.id===id);
  if(!b) return;
  const url = shareLink(`#/book/${id}`);
  const text = b.subtitle ? `${b.title} · ${b.subtitle}` : b.title;
  doShare(b.title, text, url);
}
function shareChapter(){
  if(!currentBookId || currentChIndex===null || !chapters[currentChIndex]) return;
  const c = chapters[currentChIndex];
  const url = shareLink(`#/book/${currentBookId}/ch/${currentChIndex}`);
  let preview = (c.body||[]).slice(0,2).join(" ").trim();
  if(preview.length>140) preview = preview.slice(0,138)+"…";
  const text = preview ? `${c.title} — ${preview}` : c.title;
  doShare(c.title, text, url);
}

/* ------------ utils / sw ------------ */
function esc(s){return s.replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");
</script>
