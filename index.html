<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>శ్రీ సాయి సచ్చరిత్ర</title>
<meta name="description" content="Sri Sai Satcharitra — Telugu parayana reader">
<meta name="theme-color" content="#FAF6ED">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Telugu:wght@400;500;700&family=Suranna&family=Noto+Sans+Telugu:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FAF6ED; --ink:#33291F; --ink-soft:#6E6152;
  --kumkuma:#A93226; --pasupu:#C99414; --line:#E4DBC8;
  --card:#FFFDF7; --bead:#D8CDB6; --bead-done:#A93226;
  --serif:'Noto Serif Telugu',serif; --disp:'Suranna',serif; --sans:'Noto Sans Telugu',system-ui,sans-serif;
}
[data-theme="sepia"]{
  --paper:#F2E7D0; --ink:#4A3B28; --ink-soft:#7D6B50; --line:#DCCCA9;
  --card:#F8F0DD; --bead:#CBBB98;
}
[data-theme="dark"]{
  --paper:#191512; --ink:#E9E0D0; --ink-soft:#9C8F7C;
  --kumkuma:#E07B5F; --pasupu:#D9AD3C; --line:#332C24;
  --card:#211C17; --bead:#3D3529; --bead-done:#E07B5F;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);
  transition:background .25s,color .25s;min-height:100dvh}
button{font-family:var(--sans);background:none;border:none;color:inherit;cursor:pointer}
:focus-visible{outline:2px solid var(--kumkuma);outline-offset:2px}
.hide{display:none!important}

/* ---------- top bar ---------- */
header{position:sticky;top:0;z-index:5;background:var(--paper);
  border-bottom:1px solid var(--line);
  padding:calc(env(safe-area-inset-top) + 10px) 16px 10px;
  display:flex;align-items:center;gap:10px}
header h1{font-family:var(--disp);font-size:1.5rem;font-weight:400;
  color:var(--kumkuma);flex:1;line-height:1.2}
header .sub{font-size:.68rem;color:var(--ink-soft);letter-spacing:.08em;text-transform:uppercase}
.iconbtn{font-size:1.15rem;padding:8px;border-radius:8px;line-height:1;color:var(--ink-soft)}
.iconbtn:active{background:var(--line)}

/* ---------- home ---------- */
main{padding:16px 16px calc(env(safe-area-inset-bottom) + 24px);max-width:640px;margin:0 auto}
.continue{display:block;width:100%;text-align:left;background:var(--kumkuma);color:#FBF3E7;
  border-radius:14px;padding:14px 16px;margin-bottom:18px}
.continue .lbl{font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;opacity:.85}
.continue .ttl{font-family:var(--serif);font-size:1.05rem;font-weight:500;margin-top:3px}

/* mala */
.mala{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;
  padding:14px 10px;border:1px solid var(--line);border-radius:14px;
  background:var(--card);margin-bottom:6px}
.bead{width:11px;height:11px;border-radius:50%;background:var(--bead);transition:background .3s}
.bead.done{background:var(--bead-done)}
.mala-cap{text-align:center;font-size:.75rem;color:var(--ink-soft);margin-bottom:18px}
.mala-cap b{color:var(--kumkuma)}

.dayhdr{display:flex;align-items:baseline;gap:8px;margin:22px 2px 8px}
.dayhdr .d{font-family:var(--disp);font-size:1.25rem;color:var(--kumkuma)}
.dayhdr .rule{flex:1;height:1px;background:var(--line)}
.chlist{display:flex;flex-direction:column;gap:8px}
.ch{display:flex;align-items:center;gap:12px;background:var(--card);
  border:1px solid var(--line);border-radius:12px;padding:12px 14px;text-align:left;width:100%}
.ch .num{font-family:var(--disp);font-size:1.15rem;color:var(--pasupu);min-width:1.8em;text-align:center}
.ch .t{flex:1;font-family:var(--serif);font-size:.95rem;line-height:1.45}
.ch .tick{font-size:1rem;color:var(--bead)}
.ch.read .tick{color:var(--kumkuma)}
.ch.read .t{color:var(--ink-soft)}

/* ---------- reader ---------- */
#reader article{font-family:var(--serif);line-height:1.9;padding-top:6px}
#reader h2{font-family:var(--disp);font-weight:400;color:var(--kumkuma);
  font-size:1.45em;line-height:1.4;text-align:center;margin:14px 0 20px}
#reader p{margin:0 0 1.1em;text-align:justify}
.endmark{text-align:center;font-family:var(--disp);color:var(--pasupu);
  font-size:1.3rem;margin:26px 0 10px;letter-spacing:.3em}
.endactions{display:flex;flex-direction:column;gap:10px;margin:10px 0 30px}
.btn{border:1px solid var(--line);background:var(--card);border-radius:12px;
  padding:13px;font-size:.95rem;text-align:center}
.btn.primary{background:var(--kumkuma);border-color:var(--kumkuma);color:#FBF3E7}
.navrow{display:flex;gap:10px}
.navrow .btn{flex:1}

/* ---------- settings sheet ---------- */
#sheet{position:fixed;inset:0;z-index:20;background:rgba(0,0,0,.35);display:flex;align-items:flex-end}
.panel{background:var(--card);width:100%;border-radius:18px 18px 0 0;
  padding:18px 18px calc(env(safe-area-inset-bottom) + 22px);max-width:640px;margin:0 auto}
.panel h3{font-size:.8rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);margin:14px 0 8px}
.seg{display:flex;gap:8px}
.seg button{flex:1;border:1px solid var(--line);border-radius:10px;padding:11px;font-size:.9rem}
.seg button.on{border-color:var(--kumkuma);color:var(--kumkuma);font-weight:600}
.danger{color:var(--kumkuma);font-size:.85rem;padding:12px 0 0;text-align:center;width:100%}
.hist{font-size:.8rem;color:var(--ink-soft);margin-top:6px;line-height:1.7}

/* reduced motion */
@media (prefers-reduced-motion: reduce){*{transition:none!important}}
</style>
</head>
<body data-theme="light">

<header id="topbar">
  <button class="iconbtn hide" id="backBtn" aria-label="వెనుకకు / Back">←</button>
  <div style="flex:1">
    <h1 id="barTitle">శ్రీ సాయి సచ్చరిత్ర</h1>
    <div class="sub" id="barSub">Sri Sai Satcharitra · Parayana</div>
  </div>
  <button class="iconbtn" id="settingsBtn" aria-label="Settings">Aa</button>
</header>

<main id="home"></main>
<main id="reader" class="hide"></main>

<div id="sheet" class="hide">
  <div class="panel">
    <h3>అక్షర పరిమాణం · Font size</h3>
    <div class="seg" id="fontSeg">
      <button data-f="0.9">చిన్నది</button><button data-f="1.05">మధ్యమం</button>
      <button data-f="1.25">పెద్దది</button><button data-f="1.45">అతి పెద్దది</button>
    </div>
    <h3>నేపథ్యం · Theme</h3>
    <div class="seg" id="themeSeg">
      <button data-t="light">Light</button><button data-t="sepia">Sepia</button><button data-t="dark">Dark</button>
    </div>
    <h3>పారాయణ · Parayana</h3>
    <button class="btn" id="resetBtn">కొత్త సప్తాహం ప్రారంభించండి · Start new saptaha</button>
    <div class="hist" id="histBox"></div>
    <button class="danger" id="closeSheet">మూసివేయి · Close</button>
  </div>
</div>

<script>
"use strict";
/* ------------ state ------------ */
const LS = {
  get(k,d){ try{const v=localStorage.getItem("ssc_"+k);return v===null?d:JSON.parse(v)}catch(e){return d} },
  set(k,v){ try{localStorage.setItem("ssc_"+k,JSON.stringify(v))}catch(e){} }
};
let chapters = [];
let read      = LS.get("read", {});          // {index:true}
let lastCh    = LS.get("lastCh", null);
let scrollPos = LS.get("scroll", {});        // {index: y}
let history_  = LS.get("history", []);       // ["2026-07-16", ...]
let fontScale = LS.get("font", 1.05);
let theme     = LS.get("theme", "light");

/* Parayana day grouping by actual chapter number (7-day split of 51 adhyayams). */
const DAY_SPLIT = [ [1,7], [8,15], [16,22], [23,30], [31,37], [38,44], [45,51] ];

/* Every chapter page repeats this banner as its first line; the real
   heading (e.g. "మొదటి అధ్యాయము") is the line right after it. */
const BANNER = "శ్రీ సాయి సత్ చరిత్రము";

const $ = s => document.querySelector(s);
const home = $("#home"), reader = $("#reader");

/* ------------ preprocessing ------------ */
function prepChapters(raw){
  return raw.map(c=>{
    const paras = c.paragraphs || [];
    const hasBanner = paras[0] && paras[0].trim()===BANNER;
    const titleIdx = hasBanner ? 1 : 0;
    const title = (paras[titleIdx] || c.title || "").trim();
    const body = paras.slice(titleIdx+1);
    const nums = (c.link_text||"").match(/\d+/g);
    const isChapter = /^Chapters?\b/i.test(c.link_text||"") && nums;
    return {
      ...c,
      title,
      body,
      isChapter: !!isChapter,
      chapNums: isChapter ? nums.map(Number) : []
    };
  });
}

/* ------------ boot ------------ */
applyTheme(theme);
fetch("chapters.json")
  .then(r=>r.json())
  .then(d=>{ chapters=prepChapters(d); route(); })
  .catch(()=>{ home.innerHTML="<p style='padding:30px;text-align:center'>chapters.json లోడ్ కాలేదు. ఇంటర్నెట్‌తో ఒకసారి తెరవండి.<br>Could not load chapters. Open once with internet.</p>"; });

window.addEventListener("hashchange", route);

function route(){
  const m = location.hash.match(/^#\/ch\/(\d+)$/);
  if(m && chapters[+m[1]]) showReader(+m[1]); else showHome();
}

/* ------------ home ------------ */
function showHome(){
  reader.classList.add("hide"); home.classList.remove("hide");
  $("#backBtn").classList.add("hide");
  $("#barTitle").textContent="శ్రీ సాయి సచ్చరిత్ర";
  $("#barSub").textContent="Sri Sai Satcharitra · Parayana";
  document.title="శ్రీ సాయి సచ్చరిత్ర";

  let h="";
  if(lastCh!==null && chapters[lastCh]){
    h+=`<button class="continue" onclick="location.hash='#/ch/${lastCh}'">
      <div class="lbl">చదవడం కొనసాగించండి · Continue reading</div>
      <div class="ttl">${esc(shortTitle(lastCh))}</div></button>`;
  }
  const total = chapters.length, done = Object.keys(read).length;
  h+=`<div class="mala" aria-label="progress">`;
  for(let i=0;i<total;i++) h+=`<span class="bead${read[i]?" done":""}"></span>`;
  h+=`</div><div class="mala-cap"><b>${done}</b> / ${total} అధ్యాయాలు పఠించారు</div>`;

  const covered=new Set();
  DAY_SPLIT.forEach((rg,di)=>{
    const idxs=[...chapters.keys()].filter(i=>{
      const c=chapters[i];
      return c.isChapter && c.chapNums.some(n=>n>=rg[0]&&n<=rg[1]);
    });
    if(!idxs.length)return;
    h+=dayHeader(`దినము ${di+1} · Day ${di+1}`);
    h+=`<div class="chlist">`+idxs.map(chRow).join("")+`</div>`;
    idxs.forEach(i=>covered.add(i));
  });
  const extras=[...chapters.keys()].filter(i=>!covered.has(i));
  if(extras.length){
    h+=dayHeader("పూజ మరియు హారతులు · Prayers & Aartis");
    h+=`<div class="chlist">`+extras.map(chRow).join("")+`</div>`;
  }
  home.innerHTML=h;
}
function dayHeader(t){return `<div class="dayhdr"><span class="d">${t}</span><span class="rule"></span></div>`}
function chRow(i){
  const c=chapters[i];
  const num=c.isChapter ? c.chapNums.join("–") : "✦";
  return `<button class="ch${read[i]?" read":""}" onclick="location.hash='#/ch/${i}'">
    <span class="num">${num}</span>
    <span class="t">${esc(shortTitle(i))}</span>
    <span class="tick">✔</span></button>`;
}
function shortTitle(i){
  const t=chapters[i].title||("అధ్యాయము "+i);
  return t.length>60 ? t.slice(0,58)+"…" : t;
}

/* ------------ reader ------------ */
function showReader(i){
  home.classList.add("hide"); reader.classList.remove("hide");
  $("#backBtn").classList.remove("hide");
  const c=chapters[i];
  $("#barTitle").textContent=shortTitle(i);
  $("#barSub").textContent=`Chapter ${i} of ${chapters.length-1}`;
  document.title=shortTitle(i);
  lastCh=i; LS.set("lastCh",i);

  let h=`<article style="font-size:${fontScale}rem">`;
  h+=`<h2>${esc(c.title)}</h2>`;
  c.body.forEach(p=>{ h+=`<p>${esc(p)}</p>`; });
  h+=`</article><div class="endmark">❋ ❋ ❋</div>`;
  h+=`<div class="endactions">
    <button class="btn primary" id="doneBtn">${read[i]?"పఠించారు ✔ · Read":"పఠించాను ✔ · Mark as read"}</button>
    <div class="navrow">
      ${i>0?`<button class="btn" onclick="location.hash='#/ch/${i-1}'">‹ మునుపటి</button>`:""}
      <button class="btn" onclick="location.hash=''">జాబితా · List</button>
      ${i<chapters.length-1?`<button class="btn" onclick="location.hash='#/ch/${i+1}'">తరువాత ›</button>`:""}
    </div></div>`;
  reader.innerHTML=h;
  $("#doneBtn").onclick=()=>{ read[i]=true; LS.set("read",read); location.hash=""; };

  requestAnimationFrame(()=>window.scrollTo(0, scrollPos[i]||0));
}
let scrollTimer=null;
window.addEventListener("scroll",()=>{
  if(reader.classList.contains("hide")||lastCh===null)return;
  clearTimeout(scrollTimer);
  scrollTimer=setTimeout(()=>{ scrollPos[lastCh]=window.scrollY; LS.set("scroll",scrollPos); },300);
},{passive:true});

$("#backBtn").onclick=()=>{ location.hash=""; };

/* ------------ settings ------------ */
$("#settingsBtn").onclick=()=>{ syncSheet(); $("#sheet").classList.remove("hide"); };
$("#closeSheet").onclick=()=>$("#sheet").classList.add("hide");
$("#sheet").onclick=e=>{ if(e.target.id==="sheet") $("#sheet").classList.add("hide"); };

$("#fontSeg").onclick=e=>{
  const b=e.target.closest("button"); if(!b)return;
  fontScale=+b.dataset.f; LS.set("font",fontScale); syncSheet();
  const a=reader.querySelector("article"); if(a)a.style.fontSize=fontScale+"rem";
};
$("#themeSeg").onclick=e=>{
  const b=e.target.closest("button"); if(!b)return;
  theme=b.dataset.t; LS.set("theme",theme); applyTheme(theme); syncSheet();
};
function applyTheme(t){
  document.body.dataset.theme=t;
  const meta=document.querySelector('meta[name=theme-color]');
  meta.content = t==="dark"?"#191512": t==="sepia"?"#F2E7D0":"#FAF6ED";
}
function syncSheet(){
  document.querySelectorAll("#fontSeg button").forEach(b=>b.classList.toggle("on",+b.dataset.f===fontScale));
  document.querySelectorAll("#themeSeg button").forEach(b=>b.classList.toggle("on",b.dataset.t===theme));
  $("#histBox").innerHTML = history_.length
    ? "పూర్తయిన పారాయణలు · Completed: "+history_.map(d=>`<b>${d}</b>`).join(", ")
    : "ఇంకా పారాయణ పూర్తికాలేదు · No completed saptaha yet.";
}
$("#resetBtn").onclick=()=>{
  const done=Object.keys(read).length;
  if(!confirm("కొత్త సప్తాహం ప్రారంభించాలా? ప్రస్తుత పురోగతి రీసెట్ అవుతుంది.\nStart a new saptaha? Current progress will reset."))return;
  if(done>=chapters.length-1){ history_.push(new Date().toISOString().slice(0,10)); LS.set("history",history_); }
  read={}; LS.set("read",read);
  scrollPos={}; LS.set("scroll",scrollPos);
  lastCh=null; LS.set("lastCh",null);
  $("#sheet").classList.add("hide"); showHome();
};

/* ------------ utils / sw ------------ */
function esc(s){return s.replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");
</script>
</body>
</html>
